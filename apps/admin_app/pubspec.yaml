version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  compound_core:
    path: ../../packages/compound_core

  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.0

  flutter_riverpod: ^3.0.0
  go_router: ^13.2.0

  image_picker: ^1.1.2
  image_cropper: ^8.0.0
  file_picker: ^8.0.0
  excel: ^4.0.6
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
